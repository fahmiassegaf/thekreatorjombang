<!DOCTYPE html>
<html lang="id" class="scroll-smooth">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>The Next Creator - by Kreator Jombang</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ['Outfit', 'sans-serif'], 
              mono: ['Space Mono', 'monospace'],
              display: ['Space Grotesk', 'sans-serif'],
            },
            colors: {
              background: '#020408',
              surface: '#0B0E17',
              surface_card: '#121626',
              primary: '#3B82F6',
              secondary: '#8B5CF6',
              accent: '#06B6D4',
              text_primary: '#FFFFFF',
              text_secondary: '#94A3B8',
              border_subtle: 'rgba(59, 130, 246, 0.1)',
              border_glow: 'rgba(59, 130, 246, 0.4)',
            },
            backgroundImage: {
              'hero-gradient': 'radial-gradient(circle at center, rgba(59, 130, 246, 0.15) 0%, rgba(2, 4, 8, 0) 70%)',
              'glass': 'linear-gradient(180deg, rgba(18, 22, 38, 0.8) 0%, rgba(11, 14, 23, 0.9) 100%)',
              'btn-gradient': 'linear-gradient(90deg, #3B82F6 0%, #8B5CF6 100%)',
            },
            animation: {
              'pulse-slow': 'pulse 4s cubic-bezier(0.4, 0, 0.6, 1) infinite',
              'float': 'float 6s ease-in-out infinite',
              'scrolldown': 'scrolldown 2s infinite',
              'typewriter': 'blink 1s step-end infinite',
              'marquee': 'marquee 25s linear infinite',
            },
            keyframes: {
              float: {
                '0%, 100%': { transform: 'translateY(0)' },
                '50%': { transform: 'translateY(-10px)' },
              },
              scrolldown: {
                '0%': { transform: 'translateY(0)', opacity: '0' },
                '50%': { transform: 'translateY(6px)', opacity: '1' },
                '100%': { transform: 'translateY(12px)', opacity: '0' },
              },
              blink: {
                '0%, 100%': { opacity: '1' },
                '50%': { opacity: '0.3' },
              },
              marquee: {
                '0%': { transform: 'translateX(0%)' },
                '100%': { transform: 'translateX(-100%)' },
              }
            }
          }
        }
      }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Space+Grotesk:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
      body {
        background-color: #020408;
        color: #FFFFFF;
        overflow-x: hidden; /* CRITICAL: Prevent horizontal page scroll */
        overscroll-behavior-y: none; /* Prevent rubber band on mobile */
      }
      
      /* WEB3 GRADIENT GRID BACKGROUND */
      .bg-web3-grid {
        background-color: #020408;
        background-image: 
          radial-gradient(at 50% 0%, rgba(59, 130, 246, 0.2) 0px, transparent 50%),
          radial-gradient(at 100% 0%, rgba(139, 92, 246, 0.15) 0px, transparent 50%),
          linear-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 1px),
          linear-gradient(90deg, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
        background-size: 100% 100%, 100% 100%, 50px 50px, 50px 50px;
        mask-image: linear-gradient(to bottom, black 40%, transparent 100%);
      }
      
      /* CUSTOM SCROLLBAR FOR CODE BLOCKS */
      .custom-scrollbar::-webkit-scrollbar {
        height: 6px;
        width: 6px;
      }
      .custom-scrollbar::-webkit-scrollbar-track {
        background: rgba(255, 255, 255, 0.05);
        border-radius: 4px;
      }
      .custom-scrollbar::-webkit-scrollbar-thumb {
        background: rgba(59, 130, 246, 0.4);
        border-radius: 4px;
      }
      .custom-scrollbar::-webkit-scrollbar-thumb:hover {
        background: rgba(59, 130, 246, 0.7);
      }

      /* AAA ROBOT ANIMATION ENGINE */
      .robot-container {
        position: relative;
        width: 320px;
        height: 320px;
        display: flex;
        justify-content: center;
        align-items: center;
        perspective: 1200px;
        animation: float-y 6s ease-in-out infinite; 
        pointer-events: none; /* Critical for mobile scroll */
        touch-action: none;
      }
      
      /* MOBILE RESPONSIVE FIX */
      @media (max-width: 768px) {
        .robot-container {
          transform: scale(0.55); /* Smaller scale for mobile */
          height: 180px; /* Reduced height container significantly */
          margin-top: 0px; 
          margin-bottom: 20px;
          max-width: 100%;
        }
      }

      .robot-head {
        width: 200px;
        height: 180px;
        background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #020617 100%);
        border-radius: 40px;
        position: relative;
        z-index: 10;
        transform-style: preserve-3d;
        border: 1px solid rgba(255, 255, 255, 0.1);
        box-shadow: 
          0 20px 50px rgba(0,0,0,0.5),
          0 0 30px rgba(59, 130, 246, 0.15),
          inset 0 0 60px rgba(0,0,0,0.8);
        /* Complex rotation sequence */
        animation: head-look-around 14s cubic-bezier(0.4, 0, 0.2, 1) infinite;
      }

      /* Detail: Antenna/Ears */
      .ear-left, .ear-right {
        position: absolute;
        top: 40px;
        width: 14px;
        height: 100px;
        background: #0f172a;
        border: 1px solid rgba(255,255,255,0.1);
        transform: translateZ(-20px);
        box-shadow: 0 0 15px rgba(59, 130, 246, 0.2);
      }
      .ear-left { left: -22px; border-radius: 12px 0 0 12px; }
      .ear-right { right: -22px; border-radius: 0 12px 12px 0; }
      
      .ear-left::after, .ear-right::after {
        content: '';
        position: absolute;
        top: 20%; bottom: 20%; left: 30%; right: 30%;
        background: linear-gradient(to bottom, #3B82F6, #8B5CF6);
        box-shadow: 0 0 10px #3B82F6;
        border-radius: 2px;
        animation: neon-pulse 4s ease-in-out infinite alternate;
      }

      /* Screen */
      .face-screen {
        position: absolute;
        inset: 15px;
        background: #000;
        border-radius: 28px;
        border: 1px solid rgba(59, 130, 246, 0.2);
        overflow: hidden;
        display: flex;
        justify-content: center;
        align-items: center;
        box-shadow: inset 0 0 40px rgba(6, 182, 212, 0.1);
        transform: translateZ(5px);
      }

      /* Holographic Grid on Face */
      .face-grid {
        position: absolute;
        width: 200%;
        height: 200%;
        background-image: 
          linear-gradient(rgba(59, 130, 246, 0.15) 1px, transparent 1px),
          linear-gradient(90deg, rgba(59, 130, 246, 0.15) 1px, transparent 1px);
        background-size: 20px 20px;
        opacity: 0.4;
        top: -50%; left: -50%;
        animation: grid-scroll 20s linear infinite;
        mask-image: radial-gradient(circle, black 40%, transparent 80%);
      }

      /* Eyes */
      .eyes-container {
        display: flex;
        gap: 36px;
        z-index: 20;
        filter: drop-shadow(0 0 12px rgba(6, 182, 212, 0.8));
        /* Independent eye movement */
        animation: eyes-tracking 14s cubic-bezier(0.4, 0, 0.2, 1) infinite;
      }

      .eye {
        width: 38px;
        height: 48px;
        background: #fff;
        border-radius: 50%;
        position: relative;
        /* Blink logic */
        animation: eye-blink 8s infinite;
      }
      
      .eye::after {
        content: '';
        position: absolute;
        width: 14px; height: 14px;
        background: #020408;
        border-radius: 50%;
        top: 50%; left: 50%;
        transform: translate(-50%, -50%);
        /* Pupil micro-movements */
        animation: pupil-shift 6s ease-in-out infinite;
      }

      /* Gloss */
      .face-reflection {
        position: absolute;
        top: 0; left: 0; right: 0; height: 45%;
        background: linear-gradient(to bottom, rgba(255,255,255,0.08), transparent);
        border-radius: 28px 28px 100% 100% / 30px;
        pointer-events: none;
        z-index: 30;
      }

      /* Neck & Body */
      .neck {
        position: absolute;
        bottom: -30px;
        left: 50%;
        transform: translateX(-50%);
        width: 60px;
        height: 60px;
        background: #1e293b;
        border-radius: 10px;
        z-index: 5;
        border: 1px solid rgba(255,255,255,0.1);
      }

      .robot-body-top {
        position: absolute;
        bottom: -70px;
        left: 50%;
        transform: translateX(-50%);
        width: 120px;
        height: 50px;
        background: linear-gradient(to bottom, #1e293b, #0f172a);
        border-radius: 40px 40px 10px 10px;
        border-top: 1px solid rgba(255,255,255,0.15);
        z-index: 4;
        display: flex;
        justify-content: center;
        padding-top: 12px;
        gap: 8px;
        box-shadow: 0 10px 30px rgba(0,0,0,0.5);
      }

      /* Halo Rings - Multi-layer */
      .halo-ring {
        position: absolute;
        width: 380px;
        height: 380px;
        border: 1px solid rgba(59, 130, 246, 0.1);
        border-radius: 50%;
        transform: rotateX(75deg) translateZ(-80px);
        animation: spin-cw 20s linear infinite;
        box-shadow: 0 0 30px rgba(59, 130, 246, 0.05);
        z-index: 1;
      }
      
      .halo-ring::after {
        content: '';
        position: absolute;
        inset: -20px;
        border: 1px dashed rgba(139, 92, 246, 0.2);
        border-radius: 50%;
        animation: spin-ccw 30s linear infinite;
      }

      .feature-card {
        background: rgba(18, 22, 38, 0.6);
        border: 1px solid rgba(255, 255, 255, 0.05);
        backdrop-filter: blur(10px);
        transition: all 0.4s ease;
      }
      
      .feature-card:hover {
        border-color: rgba(59, 130, 246, 0.5);
        transform: translateY(-5px);
        background: rgba(18, 22, 38, 0.9);
        box-shadow: 0 10px 40px -10px rgba(59, 130, 246, 0.2);
      }

      /* Navbar Glass */
      .nav-glass {
        background: rgba(2, 4, 8, 0.8);
        backdrop-filter: blur(20px);
        border-bottom: 1px solid rgba(255,255,255,0.05);
      }

      /* Hide Scrollbar for Cleaner Mobile Look */
      .no-scrollbar::-webkit-scrollbar {
          display: none;
      }
      .no-scrollbar {
          -ms-overflow-style: none;
          scrollbar-width: none;
      }

      ::-webkit-scrollbar { width: 4px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { 
        background: rgba(59, 130, 246, 0.3); 
        border-radius: 10px;
      }
      ::-webkit-scrollbar-thumb:hover { background: rgba(59, 130, 246, 0.6); }

      /* MASK for Linear Fade on Ticker */
      .mask-linear-fade {
        mask-image: linear-gradient(to right, transparent, black 10%, black 90%, transparent);
        -webkit-mask-image: linear-gradient(to right, transparent, black 10%, black 90%, transparent);
      }

      /* KEYFRAMES */
      @keyframes float-y {
        0%, 100% { transform: translateY(0px); }
        50% { transform: translateY(-15px); }
      }

      @keyframes head-look-around {
        0% { transform: rotateY(0deg) rotateX(0deg) rotateZ(0deg); }
        10% { transform: rotateY(15deg) rotateX(-5deg) rotateZ(2deg); } /* Look Right */
        20% { transform: rotateY(15deg) rotateX(-5deg) rotateZ(2deg); } /* Hold */
        35% { transform: rotateY(-10deg) rotateX(5deg) rotateZ(-1deg); } /* Look Left */
        50% { transform: rotateY(-10deg) rotateX(5deg) rotateZ(-1deg); } /* Hold */
        65% { transform: rotateY(0deg) rotateX(8deg) rotateZ(0deg); } /* Look Down/Center */
        80% { transform: rotateY(0deg) rotateX(8deg) rotateZ(0deg); } /* Hold */
        90% { transform: rotateY(5deg) rotateX(-2deg) rotateZ(1deg); } /* Reset adjust */
        100% { transform: rotateY(0deg) rotateX(0deg) rotateZ(0deg); }
      }

      @keyframes eyes-tracking {
        0% { transform: translate(0, 0); }
        10% { transform: translate(10px, -2px); } /* Eyes follow head right */
        20% { transform: translate(10px, -2px); }
        35% { transform: translate(-8px, 4px); } /* Eyes follow head left */
        50% { transform: translate(-8px, 4px); }
        65% { transform: translate(0, 5px); } /* Eyes look down */
        80% { transform: translate(0, 5px); }
        100% { transform: translate(0, 0); }
      }

      @keyframes pupil-shift {
        0%, 100% { transform: translate(-50%, -50%); }
        25% { transform: translate(-30%, -50%); } /* Shift right inside eye */
        50% { transform: translate(-70%, -50%); } /* Shift left inside eye */
        75% { transform: translate(-50%, -30%); } /* Shift down inside eye */
      }

      @keyframes eye-blink {
        0%, 45%, 50%, 100% { transform: scaleY(1); }
        47% { transform: scaleY(0.1); }
        20% { transform: scaleY(1); }
        22% { transform: scaleY(0.1); }
        24% { transform: scaleY(1); }
      }

      @keyframes neon-pulse {
        0% { opacity: 0.5; }
        100% { opacity: 1; }
      }

      @keyframes grid-scroll {
        0% { transform: translateY(0); }
        100% { transform: translateY(20px); }
      }

      @keyframes spin-cw { from { transform: rotateX(75deg) rotateZ(0deg); } to { transform: rotateX(75deg) rotateZ(360deg); } }
      @keyframes spin-ccw { from { transform: rotate(0deg); } to { transform: rotate(-360deg); } }
    </style>

{

</script>
